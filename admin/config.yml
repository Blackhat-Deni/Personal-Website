backend:
  name: git-gateway
  branch: main

# This line enables local development mode
local_backend: true

media_folder: "IMG" # Folder where uploaded images will be stored
public_folder: "IMG"

collections:
  - name: "gallery"
    label: "Gallery Wall"
    file: "gallery.json"
    label_singular: "Gallery Item"
    fields:
      - label: "Gallery items"
        name: "gallery"
        widget: "list"
        fields:
          - { label: "ID", name: "id", widget: "number" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Image", name: "url", widget: "image" }
          - label: "Layout Span"
            name: "span"
            widget: "select"
            options: 
              - { label: "Small (4x3)", value: "md:col-span-4 md:row-span-3" }
              - { label: "Medium (5x4)", value: "md:col-span-5 md:row-span-4" }
              - { label: "Large (8x6)", value: "md:col-span-8 md:row-span-6" }
              - { label: "Full Width", value: "md:col-span-12 md:row-span-3" }
            default: "md:col-span-4 md:row-span-3"
