<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Studio | Dashboard</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pinyon+Script&family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&family=Syne:wght@400;700;800&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        /* ═══════════════════════════════════════════════════════
           THE STUDIO — Custom Admin Theme (Refined)
           Dark, premium aesthetic matching the main site
           ═══════════════════════════════════════════════════════ */

        /* Base Override */
        html {
            background: #0a0a0a !important;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif !important;
            background: #0a0a0a !important;
            margin: 0;
            color: #e0e0e0;
        }

        /* ─── Top Navigation Bar ─── */
        header[class*="AppHeader"],
        nav[class*="Navbar"],
        div[class*="AppHeader"] {
            background: #111111 !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4) !important;
        }

        /* Logo / Site Title in navbar */
        header a[href="/"],
        a[class*="AppHeader-homeLink"],
        div[class*="AppHeader"] a:first-child {
            font-family: 'Space Mono', monospace !important;
            font-size: 0.85rem !important;
            letter-spacing: 0.25em !important;
            text-transform: uppercase !important;
            color: #d4a853 !important;
            font-weight: 700 !important;
        }

        /* ─── Sidebar / Collection List ─── */
        aside,
        div[class*="Sidebar"],
        nav[class*="Collection"] {
            background: #0a0a0a !important;
            border-right: 1px solid rgba(255, 255, 255, 0.06) !important;
        }

        /* Collection links in sidebar */
        a[class*="SidebarNavLink"],
        div[class*="Sidebar"] a,
        nav[class*="Collection"] a {
            color: #888 !important;
            font-family: 'Inter', sans-serif !important;
            font-weight: 400 !important;
            letter-spacing: 0.05em !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            border-left: 3px solid transparent !important;
            padding: 12px 24px !important;
            margin: 4px 0 !important;
        }

        a[class*="SidebarNavLink"]:hover,
        div[class*="Sidebar"] a:hover,
        nav[class*="Collection"] a:hover {
            color: #ffffff !important;
            background: rgba(212, 168, 83, 0.04) !important;
            border-left-color: rgba(212, 168, 83, 0.4) !important;
        }

        a[class*="SidebarNavLink"][class*="active"],
        div[class*="Sidebar"] a[class*="active"] {
            color: #d4a853 !important;
            background: rgba(212, 168, 83, 0.1) !important;
            border-left-color: #d4a853 !important;
            font-weight: 600 !important;
        }

        /* ─── Main Content Area ─── */
        main,
        div[class*="Main"],
        section[class*="EntryListing"],
        div[class*="entriesPanel"] {
            background: #0a0a0a !important;
        }

        /* ─── Cards / Entry Items ─── */
        div[class*="ListCard"],
        div[class*="EntryCard"],
        li[class*="EntryListing"],
        div[class*="objectControl"],
        div[class*="listControl"] {
            background: #141414 !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 12px !important;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2) !important;
        }

        div[class*="ListCard"]:hover,
        div[class*="EntryCard"]:hover {
            border-color: rgba(212, 168, 83, 0.3) !important;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4) !important;
            transform: translateY(-2px) !important;
        }

        /* ─── Form Inputs ─── */
        input[type="text"],
        input[type="number"],
        input[type="url"],
        input[type="email"],
        textarea,
        select {
            background: #1a1a1a !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 8px !important;
            color: #e0e0e0 !important;
            font-family: 'Inter', sans-serif !important;
            padding: 12px 16px !important;
            transition: all 0.3s ease !important;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #d4a853 !important;
            box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.15) !important;
            background: #222 !important;
        }

        /* ─── Buttons ─── */
        button[class*="ToolbarButton"],
        button[class*="Button"],
        a[class*="Button"] {
            font-family: 'Space Mono', monospace !important;
            font-size: 0.75rem !important;
            letter-spacing: 0.15em !important;
            text-transform: uppercase !important;
            border-radius: 8px !important;
            transition: all 0.3s ease !important;
            font-weight: 600 !important;
        }

        /* Primary action buttons (Publish, Save) */
        button[class*="PublishButton"],
        div[class*="ToolbarSection"] button:last-child {
            background: #d4a853 !important;
            color: #000 !important;
            border: none !important;
            box-shadow: 0 4px 15px rgba(212, 168, 83, 0.3) !important;
        }

        button[class*="PublishButton"]:hover {
            background: #e5b964 !important;
            box-shadow: 0 8px 25px rgba(212, 168, 83, 0.5) !important;
            transform: translateY(-1px) !important;
        }

        /* ─── Editor Header / Breadcrumbs ─── */
        div[class*="EditorHeader"] {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 4px;
            border: 2px solid #0a0a0a;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }

        /* ─── Preview Pane ─── */
        div[class*="PaneContainer"] {
            background: #0f0f0f !important;
            border-left: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        /* Custom Label Styling */
        label[class*="ControlLabel"] {
            color: #888 !important;
            font-family: 'Space Mono', monospace !important;
            font-size: 0.7rem !important;
            letter-spacing: 0.2em !important;
            text-transform: uppercase !important;
            margin-bottom: 8px !important;
            display: block !important;
        }

        /* ─── Netlify Identity Modal ─── */
        .netlify-identity-menu,
        .netlify-identity-form {
            background: #141414 !important;
            color: #fff !important;
            border: 1px solid #333 !important;
        }

        .netlify-identity-btn {
            background: #d4a853 !important;
            color: #000 !important;
        }
    </style>
</head>

<body>
    <!-- Decap CMS Script -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- Netlify Identity Redirect Handler -->
    <script>
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

        if (window.netlifyIdentity && !isLocal) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }

        // Only handle specific local login cues if needed, 
        // but generally Decap local backend handles itself.
        document.addEventListener('DOMContentLoaded', () => {
            if (isLocal) {
                console.log("THE STUDIO: Running in Local Mode. Netlify Identity disabled.");
            }
        });
    </script>

    <!-- ═══════════════════════════════════════════════════════
       LIVE PREVIEW TEMPLATES
       Rendering site components exactly as they appear live
       ═══════════════════════════════════════════════════════ -->
    <script>
        const h = window.h;

        // --- Helper to fix image paths for preview ---
        const fixImg = (src) => {
            if (!src) return '';
            // If it starts with ../, we resolve it relative to root
            if (src.startsWith('../')) return src.substring(2);
            // If it's just a filename (for books), we add the path
            if (!src.includes('/')) return `/assets/images/books/${src}`;
            return src.startsWith('/') ? src : `/${src}`;
        };

        // ════════════ BOOK PREVIEW ════════════
        const BooksPreview = createClass({
            render: function () {
                const entry = this.props.entry;
                const items = entry.getIn(['data', 'items']);

                return h('div', { className: 'theme-library library-page' },
                    h('div', { className: 'library-container' },
                        h('div', { className: 'library-frame' },
                            h('div', { className: 'shelf' },
                                items && items.map((book, index) =>
                                    h('div', {
                                        key: index,
                                        className: 'book',
                                        style: { '--spine-color': book.get('spineColor') || '#333' }
                                    },
                                        h('div', { className: 'book-inner card' },
                                            h('div', { className: 'spine' }, book.get('title')),
                                            h('div', { className: 'cover' },
                                                h('img', { src: fixImg(book.get('cover')) })
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    )
                );
            }
        });

        // ════════════ MUSIC PREVIEW ════════════
        const MusicPreview = createClass({
            render: function () {
                const entry = this.props.entry;
                const cds = entry.getIn(['data', 'cds']);
                const albums = entry.getIn(['data', 'albums']);

                return h('div', { className: 'theme-music' },
                    h('div', { className: 'max-w-7xl mx-auto px-8' },
                        h('h2', { className: 'cd-tagline' }, 'Songs (CDs)'),
                        h('div', { className: 'songs-grid' },
                            cds && cds.map((cd, index) =>
                                h('div', { key: index, className: 'album-card group' },
                                    h('div', { className: 'cd-visual' },
                                        h('img', { src: fixImg(cd.get('cover')), className: 'cd-cover' }),
                                        h('div', { className: 'cd-hole' })
                                    ),
                                    h('div', { className: 'album-info' },
                                        h('h3', { className: 'card-title' }, cd.get('title')),
                                        h('p', { className: 'card-subtitle' }, cd.get('artist'))
                                    )
                                )
                            )
                        ),
                        h('h2', { className: 'cd-tagline', style: { marginTop: '80px' } }, 'Albums'),
                        h('div', { className: 'album-grid' },
                            albums && albums.map((album, index) =>
                                h('div', { key: index, className: 'album-card group' },
                                    h('div', { className: 'album-cover-wrapper' },
                                        h('img', { src: fixImg(album.get('cover')), className: 'card-image' })
                                    ),
                                    h('div', { className: 'album-info' },
                                        h('h3', { className: 'card-title' }, album.get('title')),
                                        h('p', { className: 'card-subtitle' }, album.get('artist'))
                                    )
                                )
                            )
                        )
                    )
                );
            }
        });

        // ════════════ CINEMA PREVIEW ════════════
        const CinemaPreview = createClass({
            render: function () {
                const entry = this.props.entry;
                const categories = entry.getIn(['data', 'categories']);

                return h('div', { className: 'theme-cinema' },
                    categories && categories.map((cat, catIndex) =>
                        h('div', { key: catIndex, className: 'category-section' },
                            h('h2', { className: 'category-name' }, cat.get('name')),
                            h('div', { className: 'film-grid' },
                                cat.get('items') && cat.get('items').map((item, itemIndex) =>
                                    h('div', { key: itemIndex, className: 'film-card group' },
                                        h('div', { className: 'film-poster-wrapper' },
                                            h('img', { src: fixImg(item.get('cover')), className: 'film-poster' })
                                        ),
                                        h('div', { className: 'film-info' },
                                            h('h3', { className: 'film-title' }, item.get('title')),
                                            h('p', { className: 'film-director' }, item.get('subtitle'))
                                        )
                                    )
                                )
                            )
                        )
                    )
                );
            }
        });

        // ════════════ COMPENDIUM PREVIEW ════════════
        const CompendiumPreview = createClass({
            render: function () {
                const entry = this.props.entry;
                const resources = entry.getIn(['data', 'resources']);

                return h('div', { style: { padding: '40px', background: '#0a0a0a' } },
                    h('div', { className: 'compendium-grid' },
                        resources && resources.map((res, index) =>
                            h('div', { key: index, className: 'resource-card' },
                                h('div', { className: 'category-tag', style: { color: res.get('accent') === 'emerald' ? '#10b981' : (res.get('accent') === 'stone' ? '#888' : '#0ea5e9') } }, res.get('category')),
                                h('h3', { className: 'resource-title' }, res.get('title')),
                                h('p', { className: 'resource-description' }, res.get('description'))
                            )
                        )
                    )
                );
            }
        });

        // ════════════ GALLERY PREVIEW ════════════
        const GalleryPreview = createClass({
            render: function () {
                const entry = this.props.entry;
                const items = entry.getIn(['data', 'gallery']);

                return h('div', { className: 'gallery-page', style: { padding: '40px' } },
                    h('div', { className: 'gallery-wall', style: { display: 'block' } },
                        items && items.map((item, index) =>
                            h('div', { key: index, style: { marginBottom: '30px', border: '4px solid #111', boxShadow: '8px 10px 25px rgba(0,0,0,0.1)' } },
                                h('img', { src: item.get('url'), style: { width: '100%', display: 'block' } }),
                                h('div', { style: { padding: '10px', background: '#000', color: '#fff', fontSize: '10px', textAlign: 'center' } }, item.get('title'))
                            )
                        )
                    )
                );
            }
        });

        // --- Register Styles for Preview Pane ---
        CMS.registerPreviewStyle("../assets/css/style.css");
        CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pinyon+Script&family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&family=Syne:wght@400;700;800&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap");

        // --- Register Templates ---
        CMS.registerPreviewTemplate("books", BooksPreview);
        CMS.registerPreviewTemplate("music", MusicPreview);
        CMS.registerPreviewTemplate("cinema", CinemaPreview);
        CMS.registerPreviewTemplate("compendium", CompendiumPreview);
        CMS.registerPreviewTemplate("gallery", GalleryPreview);
    </script>
</body>

</html>
