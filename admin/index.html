<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Studio | Dashboard</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        /* ═══════════════════════════════════════════════════════
           THE STUDIO — Custom Admin Theme
           Dark, premium aesthetic matching the main site
           ═══════════════════════════════════════════════════════ */

        /* Base Override */
        html {
            background: #0a0a0a !important;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif !important;
            background: #0a0a0a !important;
        }

        /* ─── Top Navigation Bar ─── */
        header[class*="AppHeader"],
        nav[class*="Navbar"],
        div[class*="AppHeader"] {
            background: linear-gradient(135deg, #111111 0%, #1a1a1a 100%) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4) !important;
        }

        /* Logo / Site Title in navbar */
        header a[href="/"],
        a[class*="AppHeader-homeLink"],
        div[class*="AppHeader"] a:first-child {
            font-family: 'Space Mono', monospace !important;
            font-size: 0.85rem !important;
            letter-spacing: 0.2em !important;
            text-transform: uppercase !important;
            color: #e0e0e0 !important;
        }

        /* ─── Sidebar / Collection List ─── */
        aside,
        div[class*="Sidebar"],
        nav[class*="Collection"] {
            background: #111111 !important;
            border-right: 1px solid rgba(255, 255, 255, 0.06) !important;
        }

        /* Collection links in sidebar */
        a[class*="SidebarNavLink"],
        div[class*="Sidebar"] a,
        nav[class*="Collection"] a {
            color: #999 !important;
            font-family: 'Inter', sans-serif !important;
            font-weight: 400 !important;
            letter-spacing: 0.05em !important;
            transition: all 0.2s ease !important;
            border-left: 3px solid transparent !important;
            padding: 10px 20px !important;
        }

        a[class*="SidebarNavLink"]:hover,
        div[class*="Sidebar"] a:hover,
        nav[class*="Collection"] a:hover {
            color: #ffffff !important;
            background: rgba(255, 255, 255, 0.04) !important;
            border-left-color: #d4a853 !important;
        }

        a[class*="SidebarNavLink"][class*="active"],
        div[class*="Sidebar"] a[class*="active"] {
            color: #ffffff !important;
            background: rgba(212, 168, 83, 0.08) !important;
            border-left-color: #d4a853 !important;
            font-weight: 600 !important;
        }

        /* ─── Main Content Area ─── */
        main,
        div[class*="Main"],
        section[class*="EntryListing"],
        div[class*="entriesPanel"] {
            background: #0f0f0f !important;
        }

        /* ─── Cards / Entry Items ─── */
        div[class*="ListCard"],
        div[class*="EntryCard"],
        li[class*="EntryListing"],
        div[class*="objectControl"],
        div[class*="listControl"] {
            background: #1a1a1a !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            border-radius: 12px !important;
            transition: all 0.3s ease !important;
        }

        div[class*="ListCard"]:hover,
        div[class*="EntryCard"]:hover {
            border-color: rgba(212, 168, 83, 0.3) !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3) !important;
            transform: translateY(-1px) !important;
        }

        /* ─── Typography ─── */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: #e0e0e0 !important;
            font-family: 'Inter', sans-serif !important;
        }

        h1 {
            font-weight: 300 !important;
            letter-spacing: 0.1em !important;
        }

        p,
        span,
        label,
        div {
            color: #bbb !important;
        }

        label[class*="ControlLabel"],
        label[for] {
            color: #888 !important;
            font-family: 'Space Mono', monospace !important;
            font-size: 0.75rem !important;
            letter-spacing: 0.15em !important;
            text-transform: uppercase !important;
        }

        /* ─── Form Inputs ─── */
        input[type="text"],
        input[type="number"],
        input[type="url"],
        input[type="email"],
        textarea,
        select {
            background: #1a1a1a !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 8px !important;
            color: #e0e0e0 !important;
            font-family: 'Inter', sans-serif !important;
            padding: 10px 14px !important;
            transition: border-color 0.3s ease, box-shadow 0.3s ease !important;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #d4a853 !important;
            box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.15) !important;
            outline: none !important;
        }

        /* ─── Buttons ─── */
        button[class*="ToolbarButton"],
        button[class*="Button"],
        a[class*="Button"] {
            font-family: 'Space Mono', monospace !important;
            font-size: 0.75rem !important;
            letter-spacing: 0.1em !important;
            text-transform: uppercase !important;
            border-radius: 8px !important;
            transition: all 0.3s ease !important;
        }

        /* Primary action buttons (Publish, Save) */
        button[class*="PublishButton"],
        div[class*="ToolbarSection"] button:last-child {
            background: linear-gradient(135deg, #d4a853 0%, #b8892e 100%) !important;
            color: #111 !important;
            border: none !important;
            font-weight: 700 !important;
            box-shadow: 0 4px 15px rgba(212, 168, 83, 0.3) !important;
        }

        button[class*="PublishButton"]:hover {
            box-shadow: 0 6px 25px rgba(212, 168, 83, 0.5) !important;
            transform: translateY(-1px) !important;
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* ─── Loading Screen ─── */
        div[class*="AppMainContainer"]::before {
            background: #0a0a0a !important;
        }

        /* ─── Dropdown Menus ─── */
        ul[class*="Dropdown"],
        div[class*="Dropdown"] {
            background: #1a1a1a !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 8px !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5) !important;
        }

        /* ─── List Item Summaries ─── */
        div[class*="ListItemTopBar"],
        div[class*="TopBar"] {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04) !important;
        }

        div[class*="summary"],
        span[class*="summary"] {
            font-family: 'Inter', sans-serif !important;
            color: #ccc !important;
        }

        /* ─── Toggle / Switch ─── */
        span[class*="Toggle"] {
            background: #333 !important;
        }

        /* ─── Status Labels ─── */
        span[class*="status"],
        div[class*="StatusTag"] {
            font-family: 'Space Mono', monospace !important;
            font-size: 0.65rem !important;
            letter-spacing: 0.1em !important;
        }

        /* ─── Color Picker Enhancement ─── */
        input[type="color"] {
            border-radius: 50% !important;
            width: 40px !important;
            height: 40px !important;
            border: 2px solid rgba(255, 255, 255, 0.1) !important;
            cursor: pointer !important;
        }

        /* ─── Netlify Identity Modal ─── */
        .netlify-identity-page,
        .netlify-identity-form,
        .netlify-identity-widget {
            font-family: 'Inter', sans-serif !important;
        }
    </style>
</head>

<body>
    <!-- Decap CMS Script -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- Netlify Identity Redirect Handler -->
    <script>
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>

</html>
