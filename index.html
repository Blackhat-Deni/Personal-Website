<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entryway</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main-style-v1.css">

    <!-- Speculative Loading (Prefetch Next Page) -->
    <link rel="prefetch" href="pages/home.html">
    <link rel="prefetch"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;700&family=Pinyon+Script&family=Space+Mono:wght@400;700&display=swap">
    <link rel="prefetch" href="https://unpkg.com/lucide@latest">
</head>

<body class="entryway fade-in">
    <video autoplay muted loop playsinline id="bg-video">
        <source src="assets/videos/background.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="content-wrapper">
        <blockquote id="quote">
            "He who has a why to live for can bear almost any how."
        </blockquote>
        <a href="pages/home.html" class="enter-btn ui-button">Explore</a>
    </div>
    <script src="assets/js/script.js"></script>
    <!-- Netlify Identity Widget (for CMS login redirect) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>

</html>
