<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Calculator — Project A</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .project-page {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--spacing-xl) var(--spacing-lg);
        }

        .project-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .project-header h1 {
            font-family: var(--font-serif);
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #f5f0e8 0%, #d4a853 60%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* --- Pixel Perfect Calculator Styles --- */
        .calculator-wrapper {
            max-width: 400px;
            margin: 2rem auto;
            background: #f0f0f0;
            border: 1px solid #999;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            font-family: Arial, sans-serif;
        }

        .display-area {
            background: #f0f0f0;
            padding: 5px;
            height: 140px;
        }

        .display-box {
            background: #1a1a1a;
            color: #ffffff;
            font-size: 90px;
            font-weight: normal;
            height: 100%;
            width: fit-content;
            min-width: 80px;
            padding: 0 15px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            line-height: 1.1;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #888;
            border-top: 1px solid #888;
        }

        .calc-btn {
            background: #eeeeee;
            border: none;
            padding: 20px 0;
            font-size: 45px;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }

        .calc-btn:active {
            background: #cccccc;
        }

        .back-nav {
            margin-top: 4rem;
            text-align: center;
        }

        .back-nav a {
            font-family: var(--font-mono);
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-nav a:hover {
            color: #d4a853;
        }
    </style>
</head>

<body class="cinema-page fade-in">
    <div class="project-page">
        <header class="project-header">
            <h1>Python Calculator</h1>
            <p class="cinema-tagline">Project A Module</p>
        </header>

        <section class="calculator-section">
            <div class="calculator-wrapper">
                <div class="display-area">
                    <div class="display-box" id="display">0</div>
                </div>
                <div class="btn-grid">
                    <button class="calc-btn" onclick="clearAll()">AC</button>
                    <button class="calc-btn" onclick="toggleNeg()">+/-</button>
                    <button class="calc-btn" onclick="percent()">%</button>
                    <button class="calc-btn" onclick="op('/')">÷</button>
                    <button class="calc-btn" onclick="num('7')">7</button>
                    <button class="calc-btn" onclick="num('8')">8</button>
                    <button class="calc-btn" onclick="num('9')">9</button>
                    <button class="calc-btn" onclick="op('*')">×</button>
                    <button class="calc-btn" onclick="num('4')">4</button>
                    <button class="calc-btn" onclick="num('5')">5</button>
                    <button class="calc-btn" onclick="num('6')">6</button>
                    <button class="calc-btn" onclick="op('-')">-</button>
                    <button class="calc-btn" onclick="num('1')">1</button>
                    <button class="calc-btn" onclick="num('2')">2</button>
                    <button class="calc-btn" onclick="num('3')">3</button>
                    <button class="calc-btn" onclick="op('+')">+</button>
                    <button class="calc-btn" onclick="num('0')">0</button>
                    <button class="calc-btn" onclick="num('.')">.</button>
                    <button class="calc-btn" onclick="squareRoot()">√</button>
                    <button class="calc-btn" onclick="equal()">=</button>
                </div>
            </div>
        </section>

        <nav class="back-nav">
            <a href="project-a.html">← Back to Projects Hub</a>
        </nav>
    </div>

    <script>
        let current = '0';
        let memory = '';
        let operator = null;
        let restart = false;

        const display = document.getElementById('display');

        function update() {
            display.innerText = current;
        }

        function num(val) {
            if (current === '0' || restart) {
                current = val;
                restart = false;
            } else {
                current += val;
            }
            update();
        }

        function op(o) {
            memory = current;
            operator = o;
            restart = true;
        }

        function clearAll() {
            current = '0';
            memory = '';
            operator = null;
            update();
        }

        function toggleNeg() {
            current = (parseFloat(current) * -1).toString();
            update();
        }

        function percent() {
            current = (parseFloat(current) / 100).toString();
            update();
        }

        function squareRoot() {
            current = Math.sqrt(parseFloat(current)).toString();
            update();
        }

        function equal() {
            if (operator && memory) {
                try {
                    current = eval(`${memory}${operator}${current}`).toString();
                    operator = null;
                    memory = '';
                    restart = true;
                    update();
                } catch (e) {
                    current = 'Error';
                    update();
                }
            }
        }
    </script>
</body>

</html>
