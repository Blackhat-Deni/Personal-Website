<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compendium | Learning Path</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;700&family=Pinyon+Script&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main-style-v1.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <style>
        .compendium-page {
            --text-color: #f5f5f4;
            background-color: #0c0a09;
            /* Deep stone-950 */
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background Effects */
        .aurora-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(180deg, #0c0a09 0%, #1c1917 100%);
            pointer-events: none;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        .back-nav {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
        }

        .aurora-blob {
            position: absolute;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            filter: blur(100px);
            animation: move 25s infinite alternate ease-in-out;
            opacity: 0.7;
        }

        .blob-1 {
            background: radial-gradient(circle, rgba(59, 130, 246, 0.35) 0%, transparent 70%);
            top: -15%;
            left: -10%;
        }

        .blob-2 {
            background: radial-gradient(circle, rgba(16, 185, 129, 0.3) 0%, transparent 70%);
            bottom: -15%;
            right: -10%;
            animation-delay: -7s;
        }

        .blob-3 {
            background: radial-gradient(circle, rgba(245, 158, 11, 0.25) 0%, transparent 70%);
            top: 35%;
            left: 35%;
            animation-delay: -14s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(10%, 10%) scale(1.1);
            }
        }

        .back-nav {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
        }

        .back-link {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #57534e;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #d4a853;
        }

        .compendium-title {
            color: #f5f5f4;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .resource-card .card-content {
            background: rgba(255, 255, 255, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(12px);
        }

        .resource-title {
            color: #f5f5f4 !important;
        }

        .resource-description {
            color: #242322 !important;
        }

        .source-link {
            color: #78716c !important;
        }

        .source-link:hover {
            color: #d4a853 !important;
        }

        .category-tag {
            background-color: rgba(255, 255, 255, 0.05) !important;
            color: #d4a853 !important;
            border: 1px solid rgba(212, 168, 83, 0.2);
        }
    </style>
</head>

<body class="compendium-page fade-in">
    <div class="aurora-container">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>
    <nav class="back-nav">
        <a href="../index.html" class="back-link">Entryway</a>
    </nav>

    <div class="container mx-auto px-1 md:px-4 py-24 max-w-6xl w-full">
        <!-- THE COMPENDIUM Section -->
        <section class="compendium-section w-full">
            <div class="compendium-header mb-16 text-center">
                <h1 class="compendium-title text-5xl uppercase tracking-[0.3em] font-light mb-4">THE COMPENDIUM</h1>
            </div>

            <div id="compendium-grid" class="compendium-grid grid grid-cols-3 md:grid-cols-3 gap-1 md:gap-8 w-full">
                <!-- Data loaded from compendium.json -->
            </div>
        </section>
    </div>

    <script src="../assets/js/script.js"></script>
    <script>
        const colorConfig = {
            blue: {
                hoverBorder: 'hover:border-blue-200',
                shadow: 'hover:shadow-blue-500/10',
                playBtn: 'bg-blue-600',
                tagBg: 'bg-blue-50',
                tagText: 'text-blue-600',
                iconHover: 'group-hover:text-blue-500'
            },
            stone: {
                hoverBorder: 'hover:border-stone-400',
                shadow: 'hover:shadow-stone-500/10',
                playBtn: 'bg-stone-800',
                tagBg: 'bg-stone-100',
                tagText: 'text-stone-600',
                iconHover: 'group-hover:text-stone-800'
            },
            emerald: {
                hoverBorder: 'hover:border-emerald-200',
                shadow: 'hover:shadow-emerald-500/10',
                playBtn: 'bg-emerald-600',
                tagBg: 'bg-emerald-50',
                tagText: 'text-emerald-600',
                iconHover: 'group-hover:text-emerald-500'
            }
        };

        async function loadCompendiumData() {
            try {
                const response = await fetch('../data/compendium.json');
                const data = await response.json();

                const grid = document.getElementById('compendium-grid');

                grid.innerHTML = data.resources.map(res => {
                    const colors = colorConfig[res.accent] || colorConfig.blue;
                    return `
                        <div class="resource-card ui-card group w-full">
                            <div class="card-content flex flex-col h-auto md:h-full border md:border rounded-none md:rounded-2xl overflow-hidden transition-all duration-700 ${colors.hoverBorder} hover:shadow-2xl ${colors.shadow}">
                                <a href="${res.url}" target="_blank" class="block relative aspect-video w-full overflow-hidden bg-transparent group/cover border-b border-white/5 md:border-none">
                                    <img src="${res.thumbnail}" alt="${res.title}" class="w-full h-full object-contain md:object-cover transition-transform duration-700 group-hover/cover:scale-105">
                                </a>
                                <div class="px-1 py-1.5 md:p-5 flex flex-col flex-grow items-start text-left bg-transparent">
                                    <span class="category-tag text-[10px] font-bold tracking-tighter uppercase mb-2 md:mb-3 py-1 px-3 ${colors.tagBg} ${colors.tagText} rounded-full w-fit hidden md:inline-block">${res.category}</span>
                                    <h3 class="resource-title text-[9px] sm:text-[10px] md:text-lg font-medium mb-0 md:mb-2 font-mono text-stone-200 md:text-stone-800 leading-tight md:leading-snug line-clamp-2 w-full">${res.title}</h3>
                                    <p class="resource-description text-sm text-stone-400 md:text-stone-500 line-clamp-2 leading-relaxed mt-auto hidden md:block w-full">${res.description}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Initialize Lucide icons after rendering
                if (window.lucide) {
                    lucide.createIcons();
                }

            } catch (error) {
                console.error('Error loading compendium data:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadCompendiumData);
    </script>
</body>

</html>
