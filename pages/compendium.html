<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compendium | Learning Path</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Google Fonts: JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .compendium-page {
            --text-color: #111111;
            background-color: #fafaf9;
            /* Fallback */
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background Effects */
        .aurora-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-color: #fafaf9;
            pointer-events: none;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        .back-nav {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
        }

        .aurora-blob {
            position: absolute;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            filter: blur(100px);
            animation: move 25s infinite alternate ease-in-out;
            opacity: 0.7;
        }

        .blob-1 {
            background: radial-gradient(circle, rgba(59, 130, 246, 0.35) 0%, transparent 70%);
            top: -15%;
            left: -10%;
        }

        .blob-2 {
            background: radial-gradient(circle, rgba(16, 185, 129, 0.3) 0%, transparent 70%);
            bottom: -15%;
            right: -10%;
            animation-delay: -7s;
        }

        .blob-3 {
            background: radial-gradient(circle, rgba(245, 158, 11, 0.25) 0%, transparent 70%);
            top: 35%;
            left: 35%;
            animation-delay: -14s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(10%, 10%) scale(1.1);
            }
        }

        .back-nav {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
        }

        .back-link {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #888;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #111;
        }
    </style>
</head>

<body class="compendium-page fade-in">
    <div class="aurora-container">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>
    <nav class="back-nav">
        <a href="../index.html" class="back-link">Entryway</a>
    </nav>

    <div class="container mx-auto px-4 py-24 max-w-6xl">
        <!-- THE COMPENDIUM Section -->
        <section class="compendium-section">
            <div class="compendium-header mb-16 text-center">
                <h1 class="compendium-title text-5xl uppercase tracking-[0.3em] font-light mb-4">THE COMPENDIUM</h1>
            </div>

            <div id="compendium-grid" class="compendium-grid grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Data loaded from compendium.json -->
            </div>
        </section>
    </div>

    <script src="../assets/js/script.js"></script>
    <script>
        const colorConfig = {
            blue: {
                hoverBorder: 'hover:border-blue-200',
                shadow: 'hover:shadow-blue-500/10',
                playBtn: 'bg-blue-600',
                tagBg: 'bg-blue-50',
                tagText: 'text-blue-600',
                iconHover: 'group-hover:text-blue-500'
            },
            stone: {
                hoverBorder: 'hover:border-stone-400',
                shadow: 'hover:shadow-stone-500/10',
                playBtn: 'bg-stone-800',
                tagBg: 'bg-stone-100',
                tagText: 'text-stone-600',
                iconHover: 'group-hover:text-stone-800'
            },
            emerald: {
                hoverBorder: 'hover:border-emerald-200',
                shadow: 'hover:shadow-emerald-500/10',
                playBtn: 'bg-emerald-600',
                tagBg: 'bg-emerald-50',
                tagText: 'text-emerald-600',
                iconHover: 'group-hover:text-emerald-500'
            }
        };

        async function loadCompendiumData() {
            try {
                const response = await fetch('../data/compendium.json');
                const data = await response.json();

                const grid = document.getElementById('compendium-grid');

                grid.innerHTML = data.resources.map(res => {
                    const colors = colorConfig[res.accent] || colorConfig.blue;
                    return `
                        <div class="resource-card ui-card group">
                            <div class="card-content flex flex-col h-full border border-stone-100 rounded-3xl overflow-hidden transition-all duration-500 ${colors.hoverBorder} hover:shadow-2xl ${colors.shadow} bg-white">
                                <a href="${res.url}" target="_blank" class="block relative aspect-[16/10] overflow-hidden group/cover">
                                    <img src="${res.thumbnail}" alt="${res.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover/cover:scale-110">
                                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover/cover:opacity-100 transition-opacity flex items-center justify-center">
                                        <div class="w-14 h-14 ${colors.playBtn} rounded-full flex items-center justify-center text-white shadow-lg transform scale-90 group-hover/cover:scale-100 transition-transform duration-500">
                                            <i data-lucide="play" class="w-6 h-6 fill-current"></i>
                                        </div>
                                    </div>
                                </a>
                                <div class="p-8 flex flex-col flex-grow">
                                    <span class="category-tag text-[10px] font-bold tracking-tighter uppercase mb-4 py-1 px-3 ${colors.tagBg} ${colors.tagText} rounded-full w-fit">${res.category}</span>
                                    <h3 class="resource-title text-2xl font-medium mb-4 font-mono text-stone-800">${res.title}</h3>
                                    <p class="resource-description text-sm text-stone-500 mb-8 flex-grow leading-relaxed">${res.description}</p>
                                    <div class="card-footer flex justify-between items-center border-t border-stone-50 pt-6">
                                        <a href="${res.url}" target="_blank" class="source-link flex items-center gap-2 text-stone-400 group-hover:text-stone-900 transition-colors">
                                            <i data-lucide="${res.type === 'youtube' ? 'youtube' : 'external-link'}" class="w-4 h-4"></i>
                                            <span class="text-xs uppercase tracking-widest font-mono">${res.type === 'youtube' ? 'Watch' : 'Learn'}</span>
                                        </a>
                                        <div class="source-icon">
                                            <i data-lucide="play" class="w-5 h-5 text-stone-300 ${colors.iconHover} transition-colors"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Initialize Lucide icons after rendering
                if (window.lucide) {
                    lucide.createIcons();
                }

            } catch (error) {
                console.error('Error loading compendium data:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadCompendiumData);
    </script>
</body>

</html>
