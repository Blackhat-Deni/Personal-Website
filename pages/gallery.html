<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Wall | Digital Craftsman Portfolio</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <!-- Alpine.js CDN -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="paper-texture min-h-screen text-stone-900 overflow-x-hidden" x-data="galleryApp()">

    <!-- Navigation -->
    <nav
        class="p-6 flex justify-between items-center bg-white/40 backdrop-blur-md sticky top-0 z-30 border-b border-stone-200/50">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-serif italic tracking-tight">Gallery Wall.</h1>
            <!-- Studio Mode Indicator -->
            <template x-if="isStudioMode">
                <span
                    class="px-3 py-1 bg-orange-100 text-orange-600 text-[9px] uppercase tracking-widest font-bold rounded-full animate-pulse">Studio
                    Mode</span>
            </template>
        </div>
        <div class="space-x-8 text-[10px] uppercase tracking-[0.2em] font-light flex items-center">
            <a href="../index.html" class="hover:text-stone-500 transition-colors">Entryway</a>
            <!-- Conditional Upload Button -->
            <template x-if="isStudioMode">
                <div class="flex items-center gap-4">
                    <button @click="$refs.fileInput.click()"
                        class="bg-orange-600 text-white px-4 py-2 hover:bg-orange-700 transition-colors flex items-center gap-2 rounded-sm lowercase italic">
                        <span>+</span> Add to Collection
                    </button>
                    <input type="file" x-ref="fileInput" @change="handleUpload" hidden accept="image/*" multiple>
                </div>
            </template>
        </div>
    </nav>

    <!-- Centered Gallery Container -->
    <main class="max-w-[1400px] mx-auto px-6 py-20 flex justify-center items-center">
        <!-- Precisely mapped 24-column grid based on reference image -->
        <div
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-24 gap-4 md:gap-6 auto-rows-auto md:auto-rows-[15px] max-w-6xl w-full">

            <!-- Column 1 (Left Outer) -->

            <!-- 50x40 landscape -->
            <div @click="openLightbox('textures')"
                class="md:col-span-5 md:row-span-6 md:col-start-1 md:row-start-11 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden ui-card">
                <img src="https://images.unsplash.com/photo-1510784722466-f2aa9c52fed6?auto=format&fit=crop&q=80&w=600"
                    class="w-full h-full object-cover" loading="lazy">
            </div>


            <!-- Column 2 (Mid Left) -->
            <!-- 40x30 landscape -->
            <div
                class="md:col-span-5 md:row-span-5 md:col-start-6 md:row-start-7 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden ui-card">
                <img src="https://images.unsplash.com/photo-1490735891913-40897cdaafd1?auto=format&fit=crop&q=80&w=600"
                    class="w-full h-full object-cover" loading="lazy">
            </div>

            <!-- 60x50 very large landscape -->
            <div @click="openLightbox('workspace')"
                class="md:col-span-7 md:row-span-9 md:col-start-6 md:row-start-13 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden ui-card">
                <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&q=80&w=800"
                    class="w-full h-full object-cover duration-700" loading="lazy">
            </div>


            <!-- Column 3 (Center) -->
            <!-- 50x60 large portrait (top center) -->
            <div @click="openLightbox('light')"
                class="md:col-span-6 md:row-span-10 md:col-start-11 md:row-start-2 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden ui-card">
                <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=600"
                    class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700"
                    loading="lazy">
            </div>

            <!-- 40x30 portrait-ish (middle center) -->
            <div
                class="md:col-span-4 md:row-span-7 md:col-start-14 md:row-start-13 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden ui-card">
                <img src="https://images.unsplash.com/photo-1550009158-9ebf69173e03?auto=format&fit=crop&q=80&w=400"
                    class="w-full h-full object-cover" loading="lazy">
            </div>

            <!-- 24x30 portrait (small center bot) -->
            <div
                class="md:col-span-3 md:row-span-4 md:col-start-14 md:row-start-21 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden transform hover:rotate-1 transition-transform ui-card">
                <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&q=80&w=400"
                    class="w-full h-full object-cover" loading="lazy">
            </div>

            <!-- Column 4 (Mid Right) -->
            <!-- 40x30 landscape (top mid-right) -->
            <div
                class="md:col-span-5 md:row-span-5 md:col-start-18 md:row-start-4 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=600"
                    class="w-full h-full object-cover" loading="lazy">
            </div>

            <!-- 24x30 portrait (center mid-right) -->
            <div
                class="md:col-span-3 md:row-span-5 md:col-start-18 md:row-start-10 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden transform hover:-rotate-1 transition-transform">
                <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&q=80&w=400"
                    class="w-full h-full object-cover" loading="lazy">
            </div>

            <!-- 50x40 landscape (bottom mid-right) -->
            <div
                class="md:col-span-6 md:row-span-7 md:col-start-18 md:row-start-16 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden">
                <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=600"
                    class="w-full h-full object-cover" loading="lazy">
            </div>

            <!-- Column 5 (Far Right) -->
            <!-- 40x30 horizontal (middle far-right) -->
            <div
                class="md:col-span-5 md:row-span-5 md:col-start-22 md:row-start-9 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden transform hover:rotate-1 transition-transform">
                <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&q=80&w=600"
                    class="w-full h-full object-cover" loading="lazy">
            </div>

            <!-- User Uploads (Dynamic Slot) -->
            <template x-if="collections.uploads.images.length > 0">
                <div @click="openLightbox('uploads')"
                    class="md:col-span-4 md:row-span-5 group cursor-pointer relative bg-white p-2 frame-shadow frame-border overflow-hidden transform animate-fade-in -rotate-2">
                    <img :src="collections.uploads.images[0]" class="w-full h-full object-cover" loading="lazy">
                </div>
            </template>

        </div>
    </main>

    <!-- Lightbox -->
    <div x-show="showModal" x-cloak
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-stone-950/95 backdrop-blur-md">
        <button @click="showModal = false"
            class="absolute top-8 right-8 text-white/50 hover:text-white transition-colors">
            <svg xmlns="width" :24,"height":24, "viewBox" :"0 0 24 24", "fill" :"none", "stroke"
                :"currentColor", "stroke-width" :2, "stroke-linecap" :"round", "stroke-linejoin" :"round">
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
            </svg>
        </button>
        <div class="w-full max-w-6xl h-full flex flex-col pt-12 pb-8 overflow-y-auto no-scrollbar"
            @click.away="showModal = false">
            <div class="mb-8 text-center">
                <h2 class="text-3xl font-serif text-white italic" x-text="collections[currentCategory].title"></h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="(img, index) in collections[currentCategory].images" :key="index">
                    <div class="aspect-square bg-stone-900 border border-white/5 overflow-hidden">
                        <img :src="img" class="w-full h-full object-cover" loading="lazy">
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        function galleryApp() {
            return {
                selectedImage: null,
                isStudioMode: false,
                showModal: false,
                currentCategory: 'architecture',
                collections: {
                    architecture: { title: 'Form & Space', images: ['https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=800'] },
                    textures: { title: 'Material Studies', images: ['https://images.unsplash.com/photo-1510784722466-f2aa9c52fed6?auto=format&fit=crop&q=80&w=800'] },
                    light: { title: 'Luminous Void', images: ['https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=800'] },
                    workspace: { title: 'Creation Altar', images: ['https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&q=80&w=800'] },
                    uploads: { title: 'Your Collection', images: [] }
                },
                openLightbox(cat) {
                    this.currentCategory = cat;
                    this.showModal = true;
                    document.body.style.overflow = 'hidden';
                },
                handleUpload(event) {
                    const files = Array.from(event.target.files);
                    files.forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (e) => this.collections.uploads.images.push(e.target.result);
                        reader.readAsDataURL(file);
                    });
                },
                init() {
                    this.$watch('showModal', v => document.body.style.overflow = v ? 'hidden' : 'auto');

                    // Detect Studio Mode
                    const urlParams = new URLSearchParams(window.location.search);
                    this.isStudioMode = urlParams.get('mode') === 'studio';

                    // Load from localStorage
                    const saved = localStorage.getItem('galleryPhotos');
                    if (saved) {
                        try {
                            const images = JSON.parse(saved);
                            this.collections.uploads.images = images;
                        } catch (e) {
                            console.error('Failed to parse gallery photos:', e);
                        }
                    }
                }
            }
        }
    </script>
</body>

</html>
